<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Details</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .model-icon {
            width: 100px;
            height: 100px;
            background: #4ecca3;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            margin-top: 0;
            color: #4ecca3;
        }

        p {
            line-height: 1.6;
            color: #eeeeee;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .stat-item b {
            display: block;
            font-size: 1.2em;
            color: #4ecca3;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #1a1a2e;
            background: #4ecca3;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: #45b291;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="model-icon">📦</div>
        <h1>Model Specifications</h1>
        <p>This 3D element is a high-fidelity GLTF model optimized for mobile augmented reality experiences.</p>
        
        <div class="stats">
            <div class="stat-item">
                <b>Format</b>
                <span>GLB/GLTF</span>
            </div>
            <div class="stat-item">
                <b>Scale</b>
                <span>0.05x</span>
            </div>
            <div class="stat-item">
                <b>Type</b>
                <span>Animated</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">Return to AR</a>
    </div>
</body>
</html>
